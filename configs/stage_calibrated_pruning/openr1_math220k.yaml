seed: 1

workflow:
  profile: smoke
  root: runs/08_stage_calibrated_pruning/main_{profile}_openr1_math220k_v3

stages: [setup, reasoning, verify, final]

model:
  name_or_path: Qwen/Qwen3-1.7B
  dtype: float32
  device_map: auto
  trust_remote_code: true
  attn_implementation: eager

prompt:
  ordinary:
    use_chat_template: true
    enable_thinking: true
    answer_format: boxed
  structured:
    use_chat_template: true
    enable_thinking: true
    explicit_stage_protocol: true
    forced_assistant_prefix: "<STAGE_SETUP>\n"

generation:
  max_input_tokens: 4096
  max_new_tokens: 16384
  temperature: 0.6
  top_p: 0.95
  top_k: 20

calibration_pool:
  name_or_path: open-r1/OpenR1-Math-220k
  split: train
  max_scan: 100000
  allowed_sources: ["*"]
  excluded_sources: [GSM8k, GSM8K, MATH, Omni-MATH, amc_aime, cn_k12, cn_contest]
  near_duplicate_threshold: 0.80

selection:
  difficulty_filter: moderate

calibration:
  forward_chunk_tokens: 1024

masks:
  metric: WIFV
  structure: UL-UM
  ratios: [0.00, 0.05, 0.10, 0.15, 0.20]
  c4_samples: 32
  bias_compensation: true

evaluation:
  math500_name_or_path: HuggingFaceH4/MATH-500
  max_dev_accuracy_drop: 0.01
  minimum_stage_protocol_rate: 0.90
  maximum_structured_prompt_accuracy_drop: 0.02
  maximum_truncation_rate: 0.05

profiles:
  smoke:
    candidate_problems: 40
    generations_per_problem: 2
    calibration_problems: 16
    dev_problems: 8
    min_stage_tokens: 128
    expansion_problems: 0
    difficulty_filter: any_correct
    pool_max_scan: 2000
    pool_reservoir_multiplier: 2
    pool_stop_after_reservoir_target: true
    final_seeds: [1]
  pilot:
    candidate_problems: 300
    generations_per_problem: 4
    calibration_problems: 64
    dev_problems: 64
    min_stage_tokens: 2048
    expansion_problems: 0
    final_seeds: [1]
  formal:
    candidate_problems: 1200
    generations_per_problem: 4
    calibration_problems: 256
    dev_problems: 128
    min_stage_tokens: 2048
    expansion_problems: 400
    final_seeds: [1, 2, 3]
