seed: 1

workflow:
  profile: smoke
  root: runs/08_stage_calibrated_pruning/main_smoke_plus_orca_math_labels_v2

stages: [setup, reasoning, verify, final]

model:
  name_or_path: Qwen/Qwen3-1.7B
  dtype: float32
  device_map: auto
  trust_remote_code: true
  attn_implementation: eager

prompt:
  ordinary:
    use_chat_template: true
    enable_thinking: true
    answer_format: boxed
  structured:
    use_chat_template: true
    enable_thinking: true
    explicit_stage_protocol: true
    forced_assistant_prefix: "[[STAGE_SETUP]]\n"

generation:
  max_input_tokens: 4096
  max_new_tokens: 16384
  temperature: 0.6
  top_p: 0.95
  top_k: 20

calibration_pool:
  name_or_path: microsoft/orca-math-word-problems-200k
  split: train
  max_scan: 4000
  reservoir_multiplier: 2
  stop_after_reservoir_target: true
  default_source: orca_math
  default_domain: grade_school_math
  allowed_sources: ["*"]
  excluded_sources: [GSM8k, GSM8K, MATH, Omni-MATH, amc_aime, cn_k12]
  near_duplicate_threshold: 0.80

selection:
  difficulty_filter: moderate

calibration:
  forward_chunk_tokens: 1024

masks:
  metric: WIFV
  structure: UL-UM
  ratios: [0.00, 0.05, 0.10, 0.15, 0.20]
  c4_samples: 32
  bias_compensation: true

evaluation:
  math500_name_or_path: HuggingFaceH4/MATH-500
  max_dev_accuracy_drop: 0.01
  minimum_stage_protocol_rate: 0.90
  maximum_structured_prompt_accuracy_drop: 0.02
  maximum_truncation_rate: 0.05

profiles:
  smoke:
    candidate_problems: 120
    generations_per_problem: 2
    calibration_problems: 32
    dev_problems: 24
    min_stage_tokens: 512
    min_stage_tokens_by_stage:
      setup: 512
      reasoning: 512
      verify: 512
      final: 128
    expansion_problems: 0
    difficulty_filter: any_correct
    c4_samples: 0
    final_eval_limit: 0
    final_methods: [ordinary_dense, structured_dense, stage_budget]
    final_seeds: [1]
    maximum_structured_prompt_extra_errors: 1
    minimum_stage_protocol_rate: 0.85
    minimum_candidate_stage_protocol_rate: 0.80
    maximum_candidate_fallback_rate: 0.25
  pilot:
    candidate_problems: 300
    generations_per_problem: 4
    calibration_problems: 64
    dev_problems: 64
    min_stage_tokens: 2048
    min_stage_tokens_by_stage:
      setup: 2048
      reasoning: 2048
      verify: 2048
      final: 512
    expansion_problems: 0
    final_seeds: [1]
  formal:
    candidate_problems: 1200
    generations_per_problem: 4
    calibration_problems: 256
    dev_problems: 128
    min_stage_tokens: 2048
    expansion_problems: 400
    final_seeds: [1, 2, 3]
