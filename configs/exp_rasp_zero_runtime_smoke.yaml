seed: 1

model:
  name_or_path: Qwen/Qwen3-1.7B
  dtype: float32
  device_map: auto
  trust_remote_code: true
  attn_implementation: eager

prompt:
  use_chat_template: true
  enable_thinking: false
  system: You are a careful math reasoning assistant.

data:
  dataset: gsm8k
  split: test
  limit: 2

generation:
  max_input_tokens: 2048
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0

runtime_rasp:
  backend: logical_mask_v0
  controller: fixed
  fixed_ratio: 0.0
  ratios: [0.01, 0.02, 0.05, 0.10, 0.20, 0.40]
  window_tokens: 16

paths:
  run_dir: runs/rasp_zero_runtime_smoke_dense
  trajectories: runs/rasp_zero_runtime_smoke_dense/01_trajectories.jsonl
  runtime_summary: runs/rasp_zero_runtime_smoke_dense/00_runtime_summary.json
